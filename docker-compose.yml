version: "3.9"

services:
  db:
    image: postgres:16
    container_name: dhes-postgres
    environment:
      POSTGRES_DB: dhes
      POSTGRES_USER: dhes
      POSTGRES_PASSWORD: dhes
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: dhes-backend
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/dhes
      SPRING_DATASOURCE_USERNAME: dhes
      SPRING_DATASOURCE_PASSWORD: dhes
    ports:
      - "8080:8080"

volumes:
  db-data:

