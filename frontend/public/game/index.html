<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SeniorDesignExp_V1</title>
        <style>
            /* Reset CSS: Please avoid making changes here unless you know what you're doing :) */
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
    
            html, body {
                width: 100%;
                height: 100%;
            }
    
            body {
                line-height: 1;
                font-family: Georgia, 'Times New Roman', serif;
                background: transparent;
                color: #f4e5c3;
                overflow: hidden;
                position: relative;
                display: grid;
                place-items: center;
            }

            #game-container {
                position: relative;
                width: min(100vh, 100vw);
                height: min(100vh, 100vw);
                background: transparent;
            }

            #game-container canvas {
                display: block;
                max-width: 100%;
                max-height: 100%;
                margin: 0 auto;
            }
    
            ol, ul {
                list-style: none;
            }
    
            img, video {
                max-width: 100%;
                height: auto;
                display: block;
            }
    
            a {
                text-decoration: none;
                color: inherit;
            }
        </style>
    </head>
    <body>
        <div id="game-container"></div>
        <script src="./phaser.js"></script>
        <script type="module" src="./src/main.js"></script>
    </body>
    </html>
